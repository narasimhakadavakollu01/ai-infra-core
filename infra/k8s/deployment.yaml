apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-platform-api
  namespace: ai-platform
  labels:
    app: ai-platform-api
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-platform-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ai-platform-api
    spec:
      containers:
        - name: api
          image: ai-platform-api:latest  # Local image tag
          imagePullPolicy: Never         # Kind cluster local image kosam
          ports:
            - containerPort: 8000
          env:
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: ai-platform-secrets
                  key: redis-url
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ai-platform-secrets
                  key: database-url
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-platform-secrets
                  key: jwt-secret
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            failureThreshold: 24
            periodSeconds: 5