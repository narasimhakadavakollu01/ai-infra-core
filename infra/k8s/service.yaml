apiVersion: v1
kind: Service
metadata:
  name: ai-platform-api
  namespace: ai-platform
spec:
  selector:
    app: ai-platform-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: ai-platform-api-lb
  namespace: ai-platform
spec:
  selector:
    app: ai-platform-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: LoadBalancer